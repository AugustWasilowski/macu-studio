# MACU Studio demo on Fly — static: Studio's real build + the demo Service Worker + baked
# ep-005 fixtures/media. The SW fakes /api/*; nginx only serves files (byte-range for video).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/json application/javascript text/css image/svg+xml;

    # The Service Worker must update promptly and is allowed root scope.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
        try_files /sw.js =404;
    }

    # nginx's stock mime.types omits .wav — force audio/wav so voiceover plays.
    location ~* \.wav$ { default_type audio/wav; }

    # Fixtures + media are real files (byte-range served natively).
    location /data/ { try_files $uri =404; }

    # SPA shell (hash-routed): anything else falls back to index.html.
    location / { try_files $uri $uri/ /index.html; }
}
