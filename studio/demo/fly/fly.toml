# Fly app config for the public MACU Studio demo. build_demo.sh deploys here when
# MACU_DEMO_FLY_APP is set (the -a flag overrides this app name if you use a different one).
app = "macu-demo"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256"
