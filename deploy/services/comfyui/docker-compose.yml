# ComfyUI — text-to-video masters (zeroscope/ModelScope T2V). Locally BUILT
# (Dockerfile here): torch cu126 baked in; the ComfyUI source + models + custom
# nodes are bind-mounted from ${MACU_DATA_ROOT}/comfyui so "always-latest" is a
# host `git pull`. restart unless-stopped (the one long-lived GPU service).
#
# First-run setup the installer's model/source step performs under
# ${MACU_DATA_ROOT}/comfyui/ :
#   - clone Comfy-Org/ComfyUI            -> ComfyUI/        (mounted at /workspace)
#   - clone the ModelScopeT2V custom node -> custom_nodes/ComfyUI_ModelScopeT2V
#   - download the text2video models      -> models/text2video/ (zeroscope_v2_576w
#     = text2video_pytorch_model.pth, plus VQGAN_autoencoder.pth; DAMO is the
#     watermarked rollback)
# Then: `docker compose build && docker compose up -d`.
services:
  comfyui:
    build:
      context: .
    image: comfyui-local:latest
    container_name: comfyui
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TZ=${TZ:-America/Chicago}
    ports:
      - 8188:8188
    volumes:
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/ComfyUI:/workspace
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/models:/workspace/models
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/output:/workspace/output
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/input:/workspace/input
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/user:/workspace/user
      - ${MACU_DATA_ROOT:-/mnt/storage}/comfyui/custom_nodes:/workspace/custom_nodes
