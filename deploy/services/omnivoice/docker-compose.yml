# OmniVoice — voice cloning + TTS (the MACU character voices). Consumer-lifecycle:
# restart "no" so it stays stopped between jobs (its ~4.6 GB starves ComfyUI's
# lowvram during renders); the Studio backend / pipeline docker-start it on demand.
#
# Volume roots come from ${MACU_DATA_ROOT} (default /mnt/storage) so this is a
# drop-in for Max AND retargetable on a new machine — set MACU_DATA_ROOT in the
# .env beside this file (see deploy/services/.env.example). The two patch files
# ship in-repo and are bind-mounted read-only over the image's buggy originals
# (gallery + the _gpu_pool model_manager fix).
#
# IMAGE IS PINNED BY DIGEST (not :latest). OmniVoice ships no DB migrations, so a
# floating :latest can silently outrun an existing omnivoice.db and break NEW voice
# clones (the voice_profiles "no column named kind/vd_states" failure, SSA-122).
# watchtower.enable=false stops the daily auto-bump. To intentionally upgrade: bump the
# digest, then ALTER-TABLE migrate voice_profiles to add the new columns (kind, vd_states,
# verified_own_voice, consent_text, consent_audio_path, consent_recorded_at) and
# re-validate the cast — a fresh DB rebuild would reassign profile_ids that speaker_maps
# reference. See deploy/services/README.md.
services:
  omnivoice:
    image: ghcr.io/debpalash/omnivoice-studio@sha256:dc1c73167dde606fdd16e11c02639e8450dcec4663afb66927c631753f2be7e7
    container_name: omnivoice
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: "no"
    ports:
      - 127.0.0.1:3900:3900
    volumes:
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/state:/root/.omnivoice
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/data:/app/omnivoice_data
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/hf-cache:/root/.cache/huggingface
      - ./patches/gallery.py:/app/backend/api/routers/gallery.py:ro
      - ./patches/model_manager.py:/app/backend/services/model_manager.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    environment:
      - TZ=${TZ:-America/Chicago}
