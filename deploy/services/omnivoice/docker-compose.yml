# OmniVoice — voice cloning + TTS (the MACU character voices). Consumer-lifecycle:
# restart "no" so it stays stopped between jobs (its ~4.6 GB starves ComfyUI's
# lowvram during renders); the Studio backend / pipeline docker-start it on demand.
#
# Volume roots come from ${MACU_DATA_ROOT} (default /mnt/storage) so this is a
# drop-in for Max AND retargetable on a new machine — set MACU_DATA_ROOT in the
# .env beside this file (see deploy/services/.env.example). The two patch files
# ship in-repo and are bind-mounted read-only over the image's buggy originals
# (gallery + the _gpu_pool model_manager fix).
#
# IMAGE IS PINNED BY DIGEST (not :latest). OmniVoice has no WORKING migration for an
# EXISTING DB: its _BASE_SCHEMA is CREATE-IF-NOT-EXISTS (only helps fresh installs), the
# inline _migrate stops at user_version 4, and the alembic chain never runs (no alembic.ini
# in the image). So a floating :latest silently outruns an existing omnivoice.db and breaks
# NEW clones with "voice_profiles has no column named kind / vd_states" (SSA-122).
# watchtower.enable=false stops the daily auto-bump. To intentionally upgrade: bump the
# digest, then SCHEMA-SYNC the existing omnivoice.db up to the new image's fresh schema —
# run the image's init_db against an empty dir to get the canonical schema, then add any
# missing tables/columns to your DB (do NOT fresh-rebuild — it reassigns profile_ids that
# speaker_maps reference). See deploy/services/README.md for the exact recipe.
services:
  omnivoice:
    image: ghcr.io/debpalash/omnivoice-studio@sha256:e05bec6c05559d6dc06a18993a113d9143e5e8ef630fa4ab3192d9fdbcd05c12
    container_name: omnivoice
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: "no"
    ports:
      - 127.0.0.1:3900:3900
    volumes:
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/state:/root/.omnivoice
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/data:/app/omnivoice_data
      - ${MACU_DATA_ROOT:-/mnt/storage}/omnivoice/hf-cache:/root/.cache/huggingface
      - ./patches/gallery.py:/app/backend/api/routers/gallery.py:ro
      - ./patches/model_manager.py:/app/backend/services/model_manager.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    environment:
      - TZ=${TZ:-America/Chicago}
